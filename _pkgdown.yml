template:
  bootstrap: 5
  bootswatch: flatly
  theme: solarized-light
  bslib:
    bg: "#ffffff"
    fg: "#000000"
    primary: "#00767d"
    secondary: "#42a7c6"
    success: "#42a7c6"
    info: "#dee6e7"
    warning: "#f57634"
    danger: "#d11807"
    light: "#dee6e7"
    dark: "#125a56"

destination: docs

url: https://shah-in-boots.github.io/epigram/

home:
  title: A Causality-Informed Modeling Approach
  description: >
    A system for describing and manipulating the many models that are
    generated in causal inference and data analysis projects, as based on the
    causal theory and criteria of Austin Bradford Hill (1965)
    <doi:10.1177/003591576505800503>. This system includes the addition of
    formal attributes that modify base `R` objects, including terms and
    formulas, with a focus on variable roles in the "do-calculus" of modeling,
    as described in Pearl (2010) <doi:10.2202/1557-4679.1203>. For example,
    the  definition of exposure, outcome, and interaction are implicit in the
    roles  variables take in a formula. These premises allow for a more fluent
    modeling approach focusing on variable relationships, and assessing effect
    modification, as described by VanderWeele and Robins (2007)
    <doi:10.1097/EDE.0b013e318127181b>. The essential goal is to help
    contextualize formulas and models in causality-oriented workflows.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [home, reference, articles, tutorials, news]
    right: [github]
  components:
    home:
      icon: fas fa-home fa-lg
      href: https://shah-in-boots.github.io/
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/shah-in-boots/epigram/

articles:
- title: The grammar
  navbar: ~
  contents:
  - terms
  - formulas
  - playing
  - fitting
  - mesa
  - articles/mdl-gt-gallery
- title: More
  navbar: More
  contents:
  - articles/usage
  - articles/internals
  - articles/development
  - s7

footer:
  structure:
    left: developed_by
    right: [built_with, colors]
  components:
    colors: Colorspace from **nightfall** palette

reference:
- title: "Terms: the atoms"
  desc: >
    Individual variables carrying their causal identity — a role, a label,
    levels, and the other attributes that make a term more than a name.
  contents:
  - tm
  - update.tm
  - describe
  - set_data
  - dplyr_extensions
- title: "Formulas: composition"
  desc: >
    Terms join and merge into families of related formulas, expanded by
    patterns and played with through fluent verbs.
  contents:
  - fmls
  - fluent_verbs
  - patterns
  - register_pattern
  - vocabulary
- title: "Models: formulas meet data"
  desc: >
    A plan is drawn up (formula by stratum by subset), executed against a
    fitting approach, and wrapped with its causal context intact.
  contents:
  - fit.fmls
  - plan_fit
  - models
  - reexports
- title: "Collections: the notebook of models"
  desc: >
    Many models stored, recalled, and compared in one table.
  contents:
  - model_table
  - model_table_helpers
  - paring
  - adjustment_sets
  - flatten_models
  - estimate_interaction
- title: "Tables: the mesa"
  desc: >
    Laying families of models out for papers, built on the `{gt}` package:
    a specification grown by verbs, rendered in one place.
- subtitle: "The grammar"
  desc: >
    The declarative specification and the verbs that narrow, relabel, lay
    out, and style it.
  contents:
  - mdl_gt
  - modify_labels
  - modify_layout
  - place_cells
  - modify_style
- subtitle: "Cell-group and effect verbs"
  desc: >
    Each verb activates or configures one named presentation or effect source.
  contents:
  - add_estimates
  - add_events
  - add_forest
  - add_interaction
- subtitle: "The renderer"
  desc: >
    Inspecting the semantic build and emitting a normal `{gt}` table.
  contents:
  - inspect_mdl_gt
  - as_gt
  - theme_gt_compact
- title: "Helpers"
  contents:
  - formula_helpers
  - labeled_formulas_to_named_list
  - data_helpers
